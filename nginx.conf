worker_processes 1;
error_log /home/mark/volna/pkghost/nginx-error.log warn;
pid /home/mark/volna/pkghost/nginx.pid;

events {
    worker_connections 64;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /home/mark/volna/pkghost/nginx-access.log;

    client_body_temp_path /tmp/volna-nginx-body;
    proxy_temp_path       /tmp/volna-nginx-proxy;
    fastcgi_temp_path     /tmp/volna-nginx-fastcgi;
    uwsgi_temp_path       /tmp/volna-nginx-uwsgi;
    scgi_temp_path        /tmp/volna-nginx-scgi;

    sendfile   on;
    tcp_nopush on;

    keepalive_timeout 15;

    server {
        listen      8080;
        server_name localhost;

        root /home/mark/volna/pkghost;

        location /packages/ {
            autoindex on;
            autoindex_exact_size off;
        }

        # APK index and package files
        location ~* \.(apk|tar\.gz)$ {
            add_header Content-Type application/octet-stream;
        }
    }
}
